vault:
  address: "http://127.0.0.1:8200"
  auth_method: "oidc"
  tls_skip_verify: true

sync:
  interval: "15m"

web:
  enabled: true
  listen: "127.0.0.1:9000"

rules:
  - name: gh
    vault_key: "gh"
    target:
      path: "~/tmp/.config/gh/hosts.yml"
      format: yaml
      template: |
        github.com:
          user: "{{ .user | default "" }}"
          oauth_token: "{{ .oauth_token | default "" }}"

  - name: ssh-private-key
    vault_key: "ssh"
    target:
      path: "~/tmp/.ssh/id_ed25519"
      format: text
      template: "{{ .private_key }}"

  - name: ssh-public-key
    vault_key: "ssh"
    target:
      path: "~/tmp/.ssh/id_ed25519.pub"
      format: text
      template: "{{ .public_key }}"

  - name: netrc
    vault_key: "netrc"
    target:
      path: "~/tmp/.netrc"
      format: netrc

  - name: jfrog
    vault_key: "jfrog"
    target:
      path: "~/tmp/.jfrog/jfrog-cli.conf.v6"
      format: json
      template: |
        {
          "servers": [
            {
              "serverId": "{{ .server_id }}",
              "url": "{{ .url }}/",
              "artifactoryUrl": "{{ .url }}/artifactory/",
              "distributionUrl": "{{ .url }}/distribution/",
              "xrayUrl": "{{ .url }}/xray/",
              "missionControlUrl": "{{ .url }}/mc/",
              "pipelinesUrl": "{{ .url }}/pipelines/",
              "accessUrl": "{{ .url }}/access/",
              "user": "{{ .user | default "" }}",
              "accessToken": "{{ .access_token }}",
              "refreshToken": "{{ .refresh_token | default "" }}",
              "webLogin": true,
              "isDefault": true
            }
          ],
          "version": "6"
        }

enrolments:
  gh:
    engine: github
  ssh:
    engine: ssh
    settings:
      passphrase: "recommended"
  jfrog:
    engine: jfrog
    settings:
      # Local Artifactory JCR from `docker compose --profile jfrog`.
      url: "http://127.0.0.1:8082"
