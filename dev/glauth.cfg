# glauth config for the dotvault-config admin-login dev loop
# (`docker compose --profile ldap up -d`). Dev-only credentials — the
# listener binds to loopback. The admin UI authenticates by binding as
# cn=<user>,ou=users,dc=example,dc=com; group membership for the admin
# check comes from the static resolver (dev/remote-layers/groups.yaml),
# not from here.

[ldap]
  enabled = true
  listen = "0.0.0.0:3893"

[ldaps]
  enabled = false

[behaviors]
  IgnoreCapabilities = true

[backend]
  datastore = "config"
  baseDN = "dc=example,dc=com"

# password is "password" (sha256)
[[users]]
  name = "admin"
  uidnumber = 5001
  primarygroup = 5501
  passsha256 = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"

# password is "password" (sha256). Not in the admin group — use this account
# to see the 403 path.
[[users]]
  name = "bob"
  uidnumber = 5002
  primarygroup = 5501
  passsha256 = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"

[[groups]]
  name = "users"
  gidnumber = 5501
