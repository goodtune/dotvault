vault:
  address: "http://127.0.0.1:8200"
  auth_method: "oidc"
  tls_skip_verify: true

sync:
  interval: "15m"

web:
  enabled: true
  listen: "127.0.0.1:9000"

# Observability is opt-in. Uncomment and point at a local OTel
# collector to exercise the metric exporter end-to-end. The Endpoint
# field accepts a host:port for gRPC (default) or a full URL for
# http/protobuf.
#
# observability:
#   enabled: true
#   endpoint: "127.0.0.1:4317"
#   protocol: "grpc"
#   insecure: true
#   export_interval: "15s"

# SSH agent surface. Serves a read-only agent.ExtendedAgent over a Unix
# domain socket (default $XDG_RUNTIME_DIR/dotvault/agent.sock) backed by the
# live Vault token. Point SSH_AUTH_SOCK at the socket to use it.
agent:
  enabled: true
  unix:
    path: ""              # default: per-user runtime socket
  windows:
    pipe: "\\\\.\\pipe\\dotvault-agent"
    putty: true           # also serve the Pageant-convention pipe (default true)
  keys:
    # Raw keys discovered under kv/data/users/<you>/ssh/* (the SSH enrolment
    # engine writes here): public_key + private_key fields per secret.
    - source: kv
      path_prefix: "ssh/"
    # Short-lived certificates minted by a Vault SSH CA. Requires the
    # ssh-client-signer engine + dotvault-user role to exist in the dev Vault;
    # absent those, the source reports an error in status without breaking the
    # daemon. Cert mode is the recommended direction (key never on disk).
    - source: vault-ca
      mount: "ssh-client-signer"
      role: "dotvault-user"
      principals: ["{{.vault_username}}"]
      ttl: "15m"
      ephemeral_key: true

rules:
  - name: gh
    vault_key: "gh"
    target:
      path: "~/tmp/.config/gh/hosts.yml"
      format: yaml
      template: |
        github.com:
          user: "{{ .user | default "" }}"
          oauth_token: "{{ .oauth_token | default "" }}"

  - name: ssh-private-key
    vault_key: "ssh"
    target:
      path: "~/tmp/.ssh/id_ed25519"
      format: text
      template: "{{ .private_key }}"

  - name: ssh-public-key
    vault_key: "ssh"
    target:
      path: "~/tmp/.ssh/id_ed25519.pub"
      format: text
      template: "{{ .public_key }}"

  - name: netrc
    vault_key: "netrc"
    target:
      path: "~/tmp/.netrc"
      format: netrc

  - name: jfrog
    vault_key: "jfrog"
    target:
      path: "~/tmp/.jfrog/jfrog-cli.conf.v6"
      format: json
      # The enrolment also stores `reference_token` (the opaque equivalent
      # of `access_token`); reference it via `{{ .reference_token }}` in a
      # rule template if a downstream tool prefers the short form.
      template: |
        {
          "servers": [
            {
              "serverId": "{{ .server_id }}",
              "url": "{{ .url }}/",
              "artifactoryUrl": "{{ .url }}/artifactory/",
              "distributionUrl": "{{ .url }}/distribution/",
              "xrayUrl": "{{ .url }}/xray/",
              "missionControlUrl": "{{ .url }}/mc/",
              "pipelinesUrl": "{{ .url }}/pipelines/",
              "accessUrl": "{{ .url }}/access/",
              "user": "{{ .user | default "" }}",
              "accessToken": "{{ .access_token }}",
              "isDefault": true
            }
          ],
          "version": "6"
        }

  # Keyless rule: no vault_key, so it never reads Vault. It manages an
  # ssh_config file built purely from the {{ username }} function and
  # literals. The example exposes the local dotvault (Vault) endpoint on a
  # remote host via a stable per-user socket — a dotvault-to-dotvault sharing
  # setup. A keyless rule must carry a template (there is no secret data to
  # fall back on).
  - name: dotvault-forward
    target:
      path: "~/tmp/.ssh/config"
      format: ssh_config
      template: |
        Host *
            User {{ username }}
            RemoteForward /home/{{ username }}/.ssh/dotvault.sock 127.0.0.1:8200

enrolments:
  gh:
    engine: github
    # Uncomment to force GitHub-engine traffic through a specific HTTPS
    # proxy. When unset, the host's native proxy machinery applies — on
    # Windows that is the IE/WinHTTP configuration including any PAC
    # script (so per-host routing decisions are honoured); elsewhere it
    # is HTTPS_PROXY / HTTP_PROXY / NO_PROXY from the daemon environment.
    # settings:
    #   https_proxy: http://squid.example.com:3128
  ssh:
    engine: ssh
    settings:
      passphrase: "recommended"
  jfrog:
    engine: jfrog
    settings:
      # Local Artifactory JCR from `docker compose --profile jfrog`.
      url: "http://127.0.0.1:8082"
      # Shorter-than-production TTL so the refresh cycle gets exercised
      # during normal dev-loop sessions (halfway point = 3 h).
      token_ttl: "6h"
  # Grouped enrolment key: "group/name" nests under users/<you>/databricks/* in
  # Vault and renders as an expandable "databricks" folder in the web UI. Add a
  # second databricks/<name> entry to manage multiple workspaces side by side.
  databricks/example:
    engine: databricks
    settings:
      # Databricks OAuth U2M (user-to-machine) login. There is no local
      # Databricks to test against, so point this at a real workspace you can
      # sign into, or comment the block out to skip it in the dev loop.
      host: "https://dbc-00000000-0000.cloud.databricks.com"
      # account_id: "<uuid>"   # set for account-level login instead
  # Mirrors kv/apps/sample/keys/{user} (seeded by vault-init) into the
  # user's enrolment path under a different field name. Re-evaluated on
  # every poll cycle by the WatchManager and, on Enterprise Vault, on
  # source-write events.
  sample:
    engine: copy
    settings:
      from:
        mount: kv
        path: apps/sample/keys/{{.user}}
      format: json
      template: |
        {
          "token": "{{ .data.key }}"
        }
