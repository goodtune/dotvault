vault:
  address: "http://127.0.0.1:8200"
  auth_method: "oidc"
  tls_skip_verify: true

sync:
  interval: "15m"

web:
  enabled: true
  listen: "127.0.0.1:9000"

rules:
  - name: gh
    vault_key: "gh"
    target:
      path: "~/tmp/.config/gh/hosts.yml"
      format: yaml
      template: |
        github.com:
          user: "{{.user}}"
          oauth_token: "{{.oauth_token}}"

  - name: ssh-private-key
    vault_key: "ssh"
    target:
      path: "~/tmp/.ssh/id_ed25519"
      format: text
      template: "{{ .private_key }}"

  - name: ssh-public-key
    vault_key: "ssh"
    target:
      path: "~/tmp/.ssh/id_ed25519.pub"
      format: text
      template: "{{ .public_key }}"

enrolments:
  gh:
    engine: github
  ssh:
    engine: ssh
    settings:
      passphrase: "recommended"
