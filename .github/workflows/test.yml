name: Test

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -o dotvault ./cmd/dotvault

      - name: Verify binary runs
        run: ./dotvault version

      - name: Verify packaged systemd unit
        run: |
          sudo install -m 0755 ./dotvault /usr/bin/dotvault
          systemd-analyze verify packaging/linux/dotvault.service
