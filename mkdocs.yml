site_name: dotvault
site_description: Vault-to-file secret synchronisation daemon
site_url: https://goodtune.github.io/dotvault/
repo_url: https://github.com/goodtune/dotvault
repo_name: goodtune/dotvault

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Configuration:
      - Config File Reference: configuration/config-reference.md
      - Sync Rules: configuration/sync-rules.md
      - Templates: configuration/templates.md
  - Authentication:
      - Overview: authentication/overview.md
      - OIDC & SSO: authentication/oidc.md
      - LDAP & MFA: authentication/ldap-mfa.md
      - Token Auth: authentication/token.md
  - Vault Setup:
      - KV Engine & Policies: vault/policies.md
  - Service Onboarding:
      - Overview: services/overview.md
      - GitHub CLI: services/github.md
      - JFrog Platform: services/jfrog.md
      - SSH Keys: services/ssh.md
  - Web UI: web-ui.md
  - Admin Guide:
      - Deployment: admin/deployment.md
      - Windows Group Policy: admin/windows-gpo.md
  - CLI Reference: cli.md
