services:
  vault:
    image: hashicorp/vault:1.21
    container_name: dotvault-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./vault-server.hcl:/vault/config/server.hcl:ro
    command: ["sh", "-c", "chown -R vault:vault /vault/data && su-exec vault vault server -config=/vault/config/server.hcl"]
    healthcheck:
      test: ["CMD", "vault", "status", "-tls-skip-verify"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  # NOTE: Add "127.0.0.1 dex" to /etc/hosts for browser-based OIDC flow
  dex:
    image: dexidp/dex:v2.41.1
    container_name: dotvault-dex
    ports:
      - "5556:5556"
    volumes:
      - ./dex.yaml:/etc/dex/config.yaml:ro
      - dex-data:/var/dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.21
    container_name: dotvault-vault-init
    depends_on:
      vault:
        condition: service_started
      dex:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        echo "==> Waiting for Vault to start..."
        until vault status 2>&1 | grep -qE '(Sealed\s+true|Sealed\s+false)'; do
          sleep 1
        done

        # Initialise if needed (single key, threshold 1 for dev use)
        if vault status 2>&1 | grep -q 'Initialized.*false'; then
          echo "==> Initialising Vault..."
          vault operator init -key-shares=1 -key-threshold=1 \
            -format=json > /vault/data/init.json
        fi

        # Extract keys from init output (no jq in vault image)
        UNSEAL_KEY=$$(sed -n '/unseal_keys_b64/{n;s/.*"\(.*\)".*/\1/p;}' /vault/data/init.json)
        ROOT_TOKEN=$$(sed -n 's/.*"root_token": *"\([^"]*\)".*/\1/p' /vault/data/init.json)

        # Unseal if sealed
        if vault status 2>&1 | grep -q 'Sealed.*true'; then
          echo "==> Unsealing Vault..."
          vault operator unseal "$$UNSEAL_KEY"
        fi

        # Authenticate with root token
        export VAULT_TOKEN="$$ROOT_TOKEN"

        echo "==> Enabling KV v2 secrets engine..."
        vault secrets enable -path=kv -version=2 kv 2>/dev/null || true

        echo "==> Writing dotvault policy..."
        vault policy write dotvault - <<'POLICY'
        path "kv/data/users/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "kv/metadata/users/*" {
          capabilities = ["read", "list", "delete"]
        }
        path "sys/events/subscribe/*" {
          capabilities = ["read"]
        }
        POLICY

        echo "==> Writing sample secrets..."
        vault kv put kv/users/gary/gh token=ghp_example_token_1234
        vault kv put kv/users/gary/netrc \
          play.stirlo.au='{"login":"gary","password":"s3cret"}'

        echo "==> Enabling OIDC auth method..."
        vault auth enable oidc 2>/dev/null || true

        echo "==> Configuring OIDC auth with Dex..."
        vault write auth/oidc/config \
          oidc_discovery_url="http://dex:5556/dex" \
          oidc_client_id="dotvault" \
          oidc_client_secret="dotvault-dev-secret" \
          default_role="default"

        echo "==> Creating OIDC default role..."
        vault write auth/oidc/role/default \
          bound_audiences="dotvault" \
          allowed_redirect_uris="http://127.0.0.1:9000/auth/oidc/callback" \
          user_claim="email" \
          oidc_scopes="openid,email" \
          token_policies="dotvault"

        # Write root token to shared volume for host access
        echo "$$ROOT_TOKEN" > /vault/data/root-token

        echo "==> Vault ready (root token written to /vault/data/root-token)"
        echo "==> Run: docker exec dotvault-vault cat /vault/data/root-token"
    volumes:
      - vault-data:/vault/data

  # Opt-in Artifactory JCR + Postgres for exercising the JFrog enrolment
  # engine. Activated by `docker compose --profile jfrog up -d`. Plain `up`
  # skips both. Artifactory 7.78+ no longer supports the embedded Derby DB,
  # so Postgres is required even for single-node dev use.
  artifactory-db:
    image: postgres:16-alpine
    container_name: dotvault-artifactory-db
    profiles: ["jfrog"]
    environment:
      POSTGRES_USER: artifactory
      POSTGRES_PASSWORD: dotvault-dev
      POSTGRES_DB: artifactory
    volumes:
      - artifactory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactory -d artifactory"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  artifactory:
    image: releases-docker.jfrog.io/jfrog/artifactory-jcr:7.98.9
    container_name: dotvault-artifactory
    profiles: ["jfrog"]
    depends_on:
      artifactory-db:
        condition: service_healthy
    # Bind explicitly to loopback so the dev-only admin password + pinned
    # master/join keys aren't reachable from the LAN. The plain "8082:8082"
    # form binds on all interfaces on Docker Desktop.
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      # Dev-only deterministic master/join keys. Artifactory refuses to start
      # without these and its auto-generation on first boot is unreliable on
      # Docker Desktop volumes; pinning them sidesteps that. NOT SECRETS —
      # this stack binds only to loopback and is for enrolment testing.
      JF_SHARED_SECURITY_MASTERKEY: "deadbeefcafebabe0123456789abcdeffedcba98765432100123456789abcdef"
      JF_SHARED_SECURITY_JOINKEY: "cafebabedeadbeef00112233445566778899aabbccddeeff0011223344556677"
      JF_SHARED_DATABASE_TYPE: "postgresql"
      JF_SHARED_DATABASE_DRIVER: "org.postgresql.Driver"
      JF_SHARED_DATABASE_URL: "jdbc:postgresql://artifactory-db:5432/artifactory"
      JF_SHARED_DATABASE_USERNAME: "artifactory"
      JF_SHARED_DATABASE_PASSWORD: "dotvault-dev"
    volumes:
      - artifactory-data:/var/opt/jfrog/artifactory
    mem_limit: 4g
    ulimits:
      nproc: 65535
      nofile:
        soft: 32000
        hard: 40000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/artifactory/api/system/ping >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s

volumes:
  vault-data:
  dex-data:
  artifactory-data:
  artifactory-db-data:
