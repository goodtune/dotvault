version: 2

before:
  hooks:
    - sh -c "cd internal/web/frontend && npm ci && npm run build"
    # Embed the Windows .exe icon. rsrc emits a COFF object (.syso) that
    # the Go linker picks up automatically for windows_amd64 targets and
    # ignores everywhere else, so generating it unconditionally is safe.
    - go tool rsrc -arch amd64 -ico assets/dotvault.ico -o cmd/dotvault/rsrc_windows_amd64.syso

builds:
  - id: dotvault
    main: ./cmd/dotvault
    binary: dotvault
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
  # Second Windows binary in the GUI subsystem for double-click + tray.
  # Same source, different PE subsystem flag — the flag is immutable
  # post-link, so we build twice. dotvault.exe (above) is the CLI;
  # dotvaultw.exe is the no-console daemon launcher.
  - id: dotvaultw
    main: ./cmd/dotvault
    binary: dotvaultw
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -H=windowsgui -X main.version={{.Version}}
    targets:
      - windows_amd64

archives:
  - allow_different_binary_count: true
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    ids:
      - dotvault
      - dotvaultw
    files:
      - README.md
      - LICENSE

nfpms:
  - id: dotvault
    package_name: dotvault
    vendor: goodtune
    homepage: https://github.com/goodtune/dotvault
    maintainer: Gary Reynolds <gary@touch.au>
    description: Vault-to-file secret synchronisation daemon
    license: MIT
    formats:
      - rpm
      - deb
      - apk
    bindir: /usr/bin
    contents:
      # dotvault is a per-user daemon (each user has their own Vault
      # identity and their own secrets), so the unit ships under the
      # user-unit search path. Enable per-user with
      # `systemctl --user enable --now dotvault.service` or globally
      # across all login sessions with `systemctl --global enable
      # dotvault.service` — neither path runs the daemon as root.
      # /usr/lib/systemd/user/ is the canonical user-unit search
      # path across RPM, DEB, and APK packagers. On Debian Bullseye+
      # and Ubuntu 20.04+ the historical /lib path is a symlink to
      # /usr/lib so either form works; on Debian Buster (10) /lib is
      # a separate directory NOT on the user-unit search path, so
      # using a single canonical path avoids a silent "unit not
      # found" on those hosts.
      - src: packaging/linux/dotvault.service
        dst: /usr/lib/systemd/user/dotvault.service
        file_info:
          mode: 0644
        packager: rpm
      - src: packaging/linux/dotvault-token-watch.path
        dst: /usr/lib/systemd/user/dotvault-token-watch.path
        file_info:
          mode: 0644
        packager: rpm
      - src: packaging/linux/dotvault-token-watch.service
        dst: /usr/lib/systemd/user/dotvault-token-watch.service
        file_info:
          mode: 0644
        packager: rpm
      - src: packaging/linux/dotvault.service
        dst: /usr/lib/systemd/user/dotvault.service
        file_info:
          mode: 0644
        packager: deb
      - src: packaging/linux/dotvault-token-watch.path
        dst: /usr/lib/systemd/user/dotvault-token-watch.path
        file_info:
          mode: 0644
        packager: deb
      - src: packaging/linux/dotvault-token-watch.service
        dst: /usr/lib/systemd/user/dotvault-token-watch.service
        file_info:
          mode: 0644
        packager: deb
      # APK doesn't ship a unit-file consumer by default (Alpine
      # uses OpenRC, not systemd), but the systemd-elogind /
      # systemd-shim packages search /usr/lib/systemd/user/. The
      # entry below makes the unit available on the small subset of
      # Alpine installations that have opted into systemd; on
      # OpenRC-only hosts the file is just dormant.
      - src: packaging/linux/dotvault.service
        dst: /usr/lib/systemd/user/dotvault.service
        file_info:
          mode: 0644
        packager: apk
      - src: packaging/linux/dotvault-token-watch.path
        dst: /usr/lib/systemd/user/dotvault-token-watch.path
        file_info:
          mode: 0644
        packager: apk
      - src: packaging/linux/dotvault-token-watch.service
        dst: /usr/lib/systemd/user/dotvault-token-watch.service
        file_info:
          mode: 0644
        packager: apk

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
